<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Analysis Agent — AI 市场分析仪表盘</title>
    <meta name="description" content="AI-powered market analysis dashboard with real-time stock recommendations, sector analysis, and sentiment tracking">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <!-- Top Header Bar -->
    <header id="header">
        <div class="header-left">
            <div class="logo">
                <svg class="logo-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="url(#logoGrad)" stroke-width="2">
                    <defs>
                        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f0b90b"/>
                            <stop offset="100%" stop-color="#00d4aa"/>
                        </linearGradient>
                    </defs>
                    <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
                    <polyline points="16 7 22 7 22 13"/>
                </svg>
                <span class="logo-text">Market Analysis Agent</span>
            </div>
        </div>
        <div class="header-right">
            <div class="status-indicator" id="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text" id="status-text">Connecting...</span>
            </div>
            <div class="last-update" id="last-update">--:--:--</div>
            <button class="refresh-btn" id="refresh-btn" title="刷新数据">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"/>
                    <polyline points="1 20 1 14 7 14"/>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                </svg>
            </button>
        </div>
    </header>

    <main id="dashboard">
        <!-- Market Overview Section -->
        <section class="market-overview" id="market-overview">
            <div class="section-header">
                <h1 class="section-title">📊 市场总览</h1>
                <span class="section-badge" id="sentiment-badge">--</span>
            </div>
            <div class="overview-grid">
                <!-- Sentiment Gauge -->
                <div class="card card-sentiment" id="sentiment-card">
                    <div class="card-label">市场情绪指数</div>
                    <div class="gauge-container">
                        <svg class="gauge-svg" viewBox="0 0 200 120">
                            <defs>
                                <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#ff4757"/>
                                    <stop offset="50%" stop-color="#f0b90b"/>
                                    <stop offset="100%" stop-color="#00d4aa"/>
                                </linearGradient>
                            </defs>
                            <path class="gauge-bg" d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="12" stroke-linecap="round"/>
                            <path class="gauge-fill" id="gauge-fill" d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="url(#gaugeGrad)" stroke-width="12" stroke-linecap="round" stroke-dasharray="251.2" stroke-dashoffset="251.2"/>
                            <text class="gauge-value" id="gauge-value" x="100" y="85" text-anchor="middle" fill="#e6e8ea" font-size="32" font-weight="700">--</text>
                            <text class="gauge-label" x="100" y="108" text-anchor="middle" fill="#848e9c" font-size="11">Fear ← → Greed</text>
                        </svg>
                    </div>
                </div>
                <!-- Key Drivers -->
                <div class="card card-drivers" id="drivers-card">
                    <div class="card-label">🎯 核心驱动力</div>
                    <ul class="driver-list" id="driver-list">
                        <li class="skeleton-line"></li>
                        <li class="skeleton-line"></li>
                        <li class="skeleton-line"></li>
                    </ul>
                </div>
                <!-- Risks -->
                <div class="card card-risks" id="risks-card">
                    <div class="card-label">⚠️ 风险提示</div>
                    <ul class="risk-list" id="risk-list">
                        <li class="skeleton-line"></li>
                        <li class="skeleton-line"></li>
                        <li class="skeleton-line"></li>
                    </ul>
                </div>
            </div>
        </section>

        <!-- Hot Sectors Section -->
        <section class="sectors-section" id="sectors-section">
            <div class="section-header">
                <h2 class="section-title">🔥 热门板块</h2>
            </div>
            <div class="sectors-grid" id="sectors-grid">
                <!-- Dynamically populated -->
                <div class="card sector-card skeleton-card"></div>
                <div class="card sector-card skeleton-card"></div>
                <div class="card sector-card skeleton-card"></div>
                <div class="card sector-card skeleton-card"></div>
            </div>
        </section>

        <!-- Stock Recommendations Section -->
        <section class="recommendations-section" id="recommendations-section">
            <div class="section-header">
                <h2 class="section-title">📈 个股推荐</h2>
                <div class="rec-filters">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn filter-buy" data-filter="buy">看涨</button>
                    <button class="filter-btn filter-hold" data-filter="hold">中性</button>
                    <button class="filter-btn filter-sell" data-filter="sell">看跌</button>
                </div>
            </div>
            <div class="recommendations-list" id="recommendations-list">
                <!-- Dynamically populated -->
                <div class="card rec-card skeleton-card" style="height:80px"></div>
                <div class="card rec-card skeleton-card" style="height:80px"></div>
                <div class="card rec-card skeleton-card" style="height:80px"></div>
            </div>
        </section>

        <!-- Bottom Row: News + WSB -->
        <section class="bottom-row">
            <!-- Live News Feed -->
            <div class="news-section" id="news-section">
                <div class="section-header">
                    <h2 class="section-title">⚡ 实时新闻</h2>
                </div>
                <div class="news-feed" id="news-feed">
                    <div class="card news-card skeleton-card" style="height:60px"></div>
                    <div class="card news-card skeleton-card" style="height:60px"></div>
                    <div class="card news-card skeleton-card" style="height:60px"></div>
                </div>
            </div>
            <!-- WSB Sentiment -->
            <div class="wsb-section" id="wsb-section">
                <div class="section-header">
                    <h2 class="section-title">🦍 WSB 散户情绪</h2>
                </div>
                <div class="wsb-content" id="wsb-content">
                    <div class="card wsb-card skeleton-card" style="height:200px"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Stock Detail Modal -->
    <div class="modal-overlay" id="stock-modal" hidden>
        <div class="modal-content">
            <button class="modal-close" id="modal-close">&times;</button>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <footer id="footer">
        <p>Powered by <a href="https://sellthenews.org" target="_blank">SellTheNews</a> MCP · Market Analysis Agent v1.0</p>
        <p class="disclaimer">⚠️ 本分析仅供参考，不构成投资建议。股市投资有风险，请谨慎决策。</p>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
